<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Extreme Calendar</title>
    <style>
        :root {
            --bg: #f7f8fa;
            --panel: #ffffff;
            --ink: #1f2933;
            --muted: #6b7280;
            --accent: #0f766e;
            --accent-soft: #dff6f3;
            --border: #d7dee4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background:
                radial-gradient(circle at top right, #e4f7f2 0%, transparent 28%),
                linear-gradient(180deg, #f9fbfc 0%, #eef3f6 100%);
            color: var(--ink);
        }

        .page {
            padding: 24px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 20px;
        }

        .hero h1 {
            margin: 0 0 6px;
            font-size: 30px;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
        }

        .status {
            min-width: 220px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
            color: var(--muted);
            text-align: right;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
        }

        .day {
            min-height: 130px;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--panel);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .day:hover {
            transform: translateY(-2px);
            border-color: #8bd3ca;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.1);
        }

        .day.today {
            background: linear-gradient(180deg, #ffffff 0%, var(--accent-soft) 100%);
            border-color: #76cfc3;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }

        .day-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .day-number {
            font-size: 26px;
            font-weight: 700;
        }

        .events {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .event {
            padding: 8px 10px;
            border-radius: 12px;
            background: #eef7f6;
            color: #155e59;
            font-size: 13px;
            line-height: 1.3;
        }

        .empty {
            color: #9aa5b1;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="hero">
        <div>
            <h1>Extreme Calendar</h1>
            <p>JavaFX hosts the shell. HTML and JavaScript render the interactive calendar.</p>
        </div>
        <div class="status" id="status">Waiting for Java to load events</div>
    </div>

    <div class="calendar" id="calendar"></div>
</div>

<script>
    const calendarElement = document.getElementById("calendar");
    const statusElement = document.getElementById("status");
    const eventsByDate = {};

    function buildWeek() {
        calendarElement.innerHTML = "";
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        for (let offset = 0; offset < 7; offset += 1) {
            const date = new Date(today);
            date.setDate(today.getDate() + offset);
            const isoDate = formatIsoDate(date);
            const card = document.createElement("div");
            card.className = "day" + (offset === 0 ? " today" : "");
            card.onclick = function () {
                setStatus("Picked " + isoDate);
                if (window.javaController && window.javaController.handleDateSelected) {
                    window.javaController.handleDateSelected(isoDate);
                }
            };

            const dayEvents = eventsByDate[isoDate] || [];
            const eventMarkup = dayEvents.length === 0
                ? '<div class="empty">No events yet</div>'
                : dayEvents.map(function (eventTitle) {
                    return '<div class="event">' + escapeHtml(eventTitle) + '</div>';
                }).join("");

            card.innerHTML =
                '<div class="day-header">' +
                    '<div class="day-name">' + date.toLocaleDateString(undefined, { weekday: "short" }) + '</div>' +
                    '<div class="day-number">' + date.getDate() + '</div>' +
                '</div>' +
                '<div class="events">' + eventMarkup + '</div>';

            calendarElement.appendChild(card);
        }
    }

    function clearEvents() {
        Object.keys(eventsByDate).forEach(function (key) {
            delete eventsByDate[key];
        });
        buildWeek();
    }

    function addEvent(isoDate, title) {
        if (!eventsByDate[isoDate]) {
            eventsByDate[isoDate] = [];
        }
        eventsByDate[isoDate].push(title);
        buildWeek();
    }

    function showCalendar() {
        buildWeek();
        setStatus("Calendar view active");
    }

    function setStatus(message) {
        statusElement.textContent = message;
    }

    function formatIsoDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return year + "-" + month + "-" + day;
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    buildWeek();
</script>
</body>
</html>
